# DPS (vanilla posterior sampling) baseline on Voronoi-PSF lensless (ImageNet).
conditioning:
  method: ps_conv
  params:
    scale: 1.0
    diff_scale: 1.0
    deconv_scale: 1.0
    kernel_size: 256
    exp_task: lensless_voronoi_imagenet_dps
    YS: 0

data:
  name: imagenet
  root: ./samples/dps_val/imagenet

measurement:
  operator:
    name: lensless_voronoi
    kernel_size: 256
    intensity: 0.5
  noise:
    name: gaussian
    sigma: 0.002
