# Dilack on severe synthetic motion deblurring (FFHQ).
conditioning:
  method: ps_dilack
  params:
    scale: 1.0
    deconv_scale: 1.0
    kernel_size: 256
    exp_task: motion_deblur_ffhq_dilack
    threshold_init: 0.7
    patch_size: 32
    skip_point: 500
    YS: 0

data:
  name: ffhq
  root: ./samples/dps_val/ffhq

measurement:
  operator:
    name: motion_blur
    kernel_size: 256
    intensity: 1.0
  noise:
    name: gaussian
    sigma: 0.0005
