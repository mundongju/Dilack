# Dilack on synthetic lensless imaging with a Voronoi-pattern PSF (FFHQ).
conditioning:
  method: ps_dilack
  params:
    scale: 1.0
    deconv_scale: 1.0
    kernel_size: 256
    exp_task: lensless_voronoi_ffhq_dilack
    threshold_init: 0.2
    patch_size: 32
    skip_point: 500
    YS: 0

data:
  name: ffhq
  root: ./samples/dps_val/ffhq

measurement:
  operator:
    name: lensless_voronoi
    kernel_size: 256
    intensity: 0.5
  noise:
    name: gaussian
    sigma: 0.002
