# Dilack on the real Waller-lab DiffuserCam data.
conditioning:
  method: ps_dilack
  params:
    scale: 1.0
    deconv_scale: 0.7
    kernel_size: 256
    exp_task: lensless_real_waller_dilack
    threshold_init: 0.6
    patch_size: 32
    skip_point: 500
    YS: 0

data:
  name: lensless_real_waller
  root: ./samples/dps_val/diffusercam_100

measurement:
  operator:
    name: lensless_real_waller
    kernel_size: 256
    intensity: 0.5
  noise:
    name: gaussian
    sigma: 0.002
